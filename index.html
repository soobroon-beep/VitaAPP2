<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VITA - Diagnóstico de Sync</title>
<style>
body{font-family:monospace;background:#07070e;color:#eef;padding:20px;font-size:14px;}
h1{color:#9d8fff;margin-bottom:20px;}
.step{margin:12px 0;padding:10px;border-radius:8px;background:#0d0d1a;border:1px solid #222;}
.ok{border-color:#7dd4c0;color:#7dd4c0;}
.err{border-color:#ff6b6b;color:#ff6b6b;}
.wait{border-color:#e8c97a;color:#e8c97a;}
button{background:#6c5ce7;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;margin:8px 4px;}
pre{white-space:pre-wrap;word-break:break-all;font-size:11px;margin-top:6px;}
</style>
</head>
<body>
<h1>🔍 VITA Sync - Diagnóstico</h1>
<div id="log"></div>
<br>
<button onclick="runTest()">▶ Ejecutar diagnóstico</button>
<button onclick="clearStorage()">🗑 Limpiar lastPush (forzar sync)</button>
<button onclick="showStorage()">📦 Ver localStorage</button>

<script>
const API_KEY = 'AIzaSyCgRAI8VJrzU_42gB11OpyvRM7MVp0CjJo';
const PROJECT = 'vota-app-c4aec';
const DOC_PATH = 'vita_users/payi-vita-pro-v3';
const AUTH_URL = 'https://identitytoolkit.googleapis.com/v1';
const FS_URL = 'https://firestore.googleapis.com/v1';

function log(msg, type='wait') {
  const el = document.getElementById('log');
  const div = document.createElement('div');
  div.className = `step ${type}`;
  div.innerHTML = msg;
  el.appendChild(div);
  console.log(msg.replace(/<[^>]+>/g,''));
}

function clearStorage() {
  localStorage.removeItem('vita3_lastPush');
  localStorage.removeItem('vita_fb_rt');
  localStorage.removeItem('vita_device_id');
  log('✓ Storage limpiado. Recarga la app VITA ahora.', 'ok');
}

function showStorage() {
  const keys = ['vita3_lastPush','vita_device_id','vita_fb_rt','vita3_tasks','vita3_habits'];
  let html = '<b>localStorage VITA:</b><br>';
  keys.forEach(k => {
    const v = localStorage.getItem(k);
    if (v) {
      const preview = v.length > 80 ? v.slice(0,80)+'...' : v;
      html += `<b>${k}</b>: ${preview}<br>`;
    } else {
      html += `<b>${k}</b>: (vacío)<br>`;
    }
  });
  log(html, 'wait');
}

async function runTest() {
  document.getElementById('log').innerHTML = '';
  
  log('🔍 Iniciando diagnóstico de sincronización VITA...');
  log(`📱 DeviceId: ${localStorage.getItem('vita_device_id') || '(no asignado)'}`);
  log(`⏰ LastPush: ${localStorage.getItem('vita3_lastPush') || '(nunca)'}`);
  
  // STEP 1: Auth
  log('🔐 [1] Probando Firebase Auth...');
  let token = null;
  try {
    const rt = localStorage.getItem('vita_fb_rt');
    if (rt) {
      log('→ Intentando refresh token...');
      const r = await fetch(`${AUTH_URL}/token?key=${API_KEY}`, {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: `grant_type=refresh_token&refresh_token=${rt}`
      });
      const d = await r.json();
      log(`→ Refresh response: HTTP ${r.status} <pre>${JSON.stringify(d).slice(0,200)}</pre>`);
      if (d.id_token) {
        token = d.id_token;
        log(`✓ Refresh token OK`, 'ok');
      }
    }
    
    if (!token) {
      log('→ Creando cuenta anónima...');
      const r = await fetch(`${AUTH_URL}/accounts:signUp?key=${API_KEY}`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({returnSecureToken: true})
      });
      const d = await r.json();
      log(`→ SignUp response: HTTP ${r.status} <pre>${JSON.stringify(d).slice(0,300)}</pre>`);
      if (d.idToken) {
        token = d.idToken;
        localStorage.setItem('vita_fb_rt', d.refreshToken);
        log(`✓ Auth anónimo OK. UID: ${d.localId}`, 'ok');
      } else {
        log(`✗ Auth FALLÓ: ${JSON.stringify(d.error)}`, 'err');
      }
    }
  } catch(e) {
    log(`✗ Auth ERROR: ${e.message}`, 'err');
  }
  
  if (!token) {
    log('❌ Sin token — no se puede continuar. Posibles causas:<br>• Firebase Auth no está habilitado para este proyecto<br>• "Acceso anónimo" deshabilitado en Firebase Console<br>• CORS bloqueado', 'err');
    return;
  }
  
  // STEP 2: Read Firestore
  log('📖 [2] Leyendo Firestore...');
  try {
    const url = `${FS_URL}/projects/${PROJECT}/databases/(default)/documents/${DOC_PATH}`;
    const r = await fetch(url, {headers: {'Authorization': 'Bearer ' + token}});
    const d = await r.json();
    log(`→ Read response: HTTP ${r.status}`);
    
    if (r.status === 404 || d.error?.code === 404) {
      log('⚠️ Documento NO existe en Firestore (es nuevo)', 'wait');
    } else if (r.ok) {
      const fields = d.fields || {};
      const keys = Object.keys(fields);
      log(`✓ Documento existe. Campos: ${keys.join(', ')}`, 'ok');
      if (fields.deviceId) log(`  deviceId: ${fields.deviceId.stringValue}`, 'ok');
      if (fields.updatedAt) log(`  updatedAt: ${fields.updatedAt.stringValue}`, 'ok');
      if (fields.tasks) {
        try {
          const t = JSON.parse(fields.tasks.stringValue);
          log(`  tasks: ${t.length} items`, 'ok');
        } catch(e) {}
      }
    } else {
      log(`✗ Read FALLÓ: HTTP ${r.status}<pre>${JSON.stringify(d.error)}</pre>`, 'err');
      if (r.status === 403) {
        log('💡 HTTP 403 = Reglas de Firestore bloquean el acceso.<br>Debes ir a Firebase Console → Firestore → Reglas y cambiar a:<br><pre>rules_version = \'2\';\nservice cloud.firestore {\n  match /databases/{database}/documents {\n    match /{document=**} {\n      allow read, write: if true;\n    }\n  }\n}</pre>', 'err');
      }
    }
  } catch(e) {
    log(`✗ Read ERROR: ${e.message}`, 'err');
  }
  
  // STEP 3: Write test
  log('✍️ [3] Probando escritura...');
  try {
    const deviceId = localStorage.getItem('vita_device_id') || 'test-diag';
    const fields = {
      _diagTest: {stringValue: 'ok-' + Date.now()},
      deviceId: {stringValue: deviceId},
      updatedAt: {stringValue: new Date().toISOString()}
    };
    const masks = Object.keys(fields).map(k => `updateMask.fieldPaths=${k}`).join('&');
    const url = `${FS_URL}/projects/${PROJECT}/databases/(default)/documents/${DOC_PATH}?${masks}`;
    const r = await fetch(url, {
      method: 'PATCH',
      headers: {'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json'},
      body: JSON.stringify({fields})
    });
    const d = await r.json();
    if (r.ok) {
      log(`✓ Escritura OK. updateTime: ${d.updateTime}`, 'ok');
    } else {
      log(`✗ Write FALLÓ: HTTP ${r.status}<pre>${JSON.stringify(d.error)}</pre>`, 'err');
      if (r.status === 403) {
        log('💡 Mismo problema: reglas de Firestore. Ve a Firebase Console y cambia las reglas.', 'err');
      }
    }
  } catch(e) {
    log(`✗ Write ERROR: ${e.message}`, 'err');
  }
  
  log('✅ Diagnóstico completo.', 'ok');
}
</script>
</body>
</html>
